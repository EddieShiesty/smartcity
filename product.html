    .product-wrap { width: min(1120px, 92%); margin: 2rem auto 4rem; }

    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--ink); }
    .breadcrumb span { color: var(--line); }

    .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; align-items: start; }

    /* Gallery */
    .gallery { display: grid; gap: 0.75rem; }
    .gallery-main { border-radius: 20px; overflow: hidden; aspect-ratio: 1/1; background: #e8ede8; }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
    .gallery-main:hover img { transform: scale(1.04); }
    .gallery-thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; }
    .gallery-thumbs button { border: 2px solid transparent; border-radius: 10px; overflow: hidden; aspect-ratio: 1/1; cursor: pointer; padding: 0; background: none; transition: border-color 0.2s; }
    .gallery-thumbs button.active { border-color: var(--accent); }
    .gallery-thumbs button img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Info panel */
    .product-info { display: grid; gap: 1.1rem; }
    .product-badge { display: inline-block; background: #eefaf6; color: #0e7168; border-radius: 999px; padding: 0.3rem 0.75rem; font-size: 0.82rem; font-weight: 700; }
    .product-info h1 { font-family: "DM Serif Display", Georgia, serif; font-size: clamp(1.6rem, 3vw, 2.3rem); line-height: 1.1; }
    .rating-row { display: flex; align-items: center; gap: 0.5rem; }
    .stars { color: #f5a623; font-size: 1rem; letter-spacing: 1px; }
    .rating-text { color: var(--muted); font-size: 0.9rem; }
    .price-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .price-big { font-size: 2rem; font-weight: 700; color: var(--brand-dark); font-family: "Space Grotesk", sans-serif; }
    .price-old { font-size: 1.1rem; color: var(--muted); text-decoration: line-through; }
    .price-save { background: #fff6e8; color: #b86e00; font-size: 0.82rem; font-weight: 700; padding: 0.25rem 0.6rem; border-radius: 999px; }

    .divider { border: none; border-top: 1px solid var(--line); }

    .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem 1rem; }
    .spec-item { display: flex; flex-direction: column; gap: 0.1rem; }
    .spec-label { font-size: 0.8rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .spec-value { font-size: 0.95rem; font-weight: 600; color: var(--ink); }

    .qty-row { display: flex; align-items: center; gap: 0.75rem; }
    .qty-label { font-size: 0.9rem; color: var(--muted); }
    .qty-ctrl { display: flex; align-items: center; gap: 0; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; background: var(--surface); }
    .qty-btn { background: none; border: none; width: 36px; height: 36px; font-size: 1.1rem; font-weight: 700; cursor: pointer; color: var(--ink); transition: background 0.15s; }
    .qty-btn:hover { background: #f0f4f0; }
    .qty-num { min-width: 36px; text-align: center; font-weight: 700; font-size: 1rem; }

    .cta-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .btn-large { padding: 0.9rem 1.5rem; font-size: 1rem; }
    .btn-outline { background: var(--surface); color: var(--ink); border: 1.5px solid var(--ink); border-radius: 999px; padding: 0.9rem 1.5rem; font-family: inherit; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    .btn-outline:hover { background: var(--ink); color: #fff; }
    .btn-wa { background: #25D366; color: #fff; border-radius: 999px; padding: 0.9rem 1.5rem; font-family: inherit; font-weight: 700; font-size: 1rem; cursor: pointer; border: none; transition: background 0.2s; display: flex; align-items: center; gap: 0.5rem; }
    .btn-wa:hover { background: #1ebe5d; }

    .trust-chips { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .trust-chip { background: #f4f6f1; border: 1px solid var(--line); border-radius: 999px; padding: 0.35rem 0.75rem; font-size: 0.82rem; color: var(--muted); font-weight: 500; }

    /* Tabs section */
    .tabs-section { margin-top: 3rem; }
    .tab-nav { display: flex; gap: 0; border-bottom: 2px solid var(--line); margin-bottom: 1.5rem; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; padding: 0.7rem 1.2rem; font-family: inherit; font-size: 0.95rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .tab-btn.active { color: var(--ink); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: rise 0.3s ease; }

    .features-list { list-style: none; display: grid; gap: 0.65rem; }
    .features-list li { display: flex; gap: 0.6rem; align-items: flex-start; font-size: 0.96rem; color: var(--ink); }
    .features-list li::before { content: "✓"; color: var(--accent); font-weight: 700; margin-top: 1px; flex-shrink: 0; }

    .reviews-grid { display: grid; gap: 1rem; }
    .review-card { border: 1px solid var(--line); border-radius: 14px; padding: 1rem; background: var(--surface); }
    .review-top { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
    .reviewer { font-weight: 700; font-size: 0.95rem; }
    .review-date { font-size: 0.82rem; color: var(--muted); }
    .review-text { font-size: 0.93rem; color: var(--muted); line-height: 1.6; }

    /* Related products */
    .related { margin-top: 3rem; }
    .related h2 { font-family: "DM Serif Display", Georgia, serif; font-size: 1.8rem; margin-bottom: 1.25rem; }
    .related-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1rem; }
    .rel-card { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 0.85rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; text-decoration: none; color: inherit; display: block; }
    .rel-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(17,34,29,0.12); }
    .rel-thumb { border-radius: 12px; height: 120px; overflow: hidden; margin-bottom: 0.6rem; }
    .rel-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .rel-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.2rem; }
    .rel-price { font-size: 0.88rem; color: var(--brand-dark); font-weight: 700; }

    @media (max-width: 860px) {
      .product-grid { grid-template-columns: 1fr; }
      .related-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 500px) {
      .spec-grid { grid-template-columns: 1fr; }
      .related-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .cta-row { flex-direction: column; }
      .btn-large, .btn-outline, .btn-wa { width: 100%; justify-content: center; }
    }
  </style>

    function getCartItems() {
      try { const raw = localStorage.getItem(CART_KEY); const p = raw ? JSON.parse(raw) : []; return Array.isArray(p) ? p : []; } catch { return []; }
    }
    function setCartItems(items) { localStorage.setItem(CART_KEY, JSON.stringify(items)); }
    function syncCartCount() {
      document.getElementById("cartCount").textContent = String(getCartItems().reduce((s, i) => s + i.qty, 0));
    }

    const fmt = new Intl.NumberFormat("en-KE");

    function loadProduct() {
      const id = new URLSearchParams(window.location.search).get("id");
      const p = PRODUCTS[id];
      if (!p) { document.querySelector("h1").textContent = "Product not found"; return; }

      document.title = "SmartCity | " + p.name;
      document.getElementById("breadcrumbName").textContent = p.name;
      document.getElementById("productBadge").textContent = p.badge;
      document.getElementById("productName").textContent = p.name;
      document.getElementById("productStars").textContent = "★".repeat(p.stars) + "☆".repeat(5 - p.stars);
      document.getElementById("productRating").textContent = p.reviewCount + " reviews";
      document.getElementById("productPrice").textContent = "KES " + fmt.format(p.price);
      document.getElementById("productDesc").textContent = p.desc;

      if (p.oldPrice) {
        document.getElementById("productOldPrice").textContent = "KES " + fmt.format(p.oldPrice);
        const save = Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100);
        const saveEl = document.getElementById("productSave");
        saveEl.textContent = "Save " + save + "%";
        saveEl.style.display = "";
      }

      // Gallery
      const mainImg = document.getElementById("mainImg");
      mainImg.src = p.images[0];
      mainImg.alt = p.name;
      const thumbs = document.getElementById("thumbs");
      p.images.forEach((src, i) => {
        const btn = document.createElement("button");
        btn.className = i === 0 ? "active" : "";
        btn.innerHTML = '<img src="' + src + '" alt="' + p.name + ' view ' + (i+1) + '" loading="lazy">';
        btn.addEventListener("click", () => {
          mainImg.src = src;
          thumbs.querySelectorAll("button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
        });
        thumbs.appendChild(btn);
      });

      // Specs summary
      const specGrid = document.getElementById("specGrid");
      const fullSpecGrid = document.getElementById("fullSpecGrid");
      let i = 0;
      for (const [k, v] of Object.entries(p.specs)) {
        const div = '<div class="spec-item"><span class="spec-label">' + k + '</span><span class="spec-value">' + v + '</span></div>';
        if (i < 4) specGrid.innerHTML += div;
        fullSpecGrid.innerHTML += div;
        i++;
      }

      // Features
      const featuresList = document.getElementById("featuresList");
      p.features.forEach(f => { featuresList.innerHTML += '<li>' + f + '</li>'; });

      // Reviews
      const reviewsGrid = document.getElementById("reviewsGrid");
      p.reviews.forEach(r => {
        reviewsGrid.innerHTML += '<div class="review-card"><div class="review-top"><span class="reviewer">' + r.name + '</span><span style="color:#f5a623">' + "★".repeat(r.stars) + "☆".repeat(5-r.stars) + '</span><span class="review-date">' + r.date + '</span></div><p class="review-text">' + r.text + '</p></div>';
      });

      // Related
      const relatedGrid = document.getElementById("relatedGrid");
      (p.related || []).slice(0, 4).forEach(rid => {
        const rp = PRODUCTS[rid];
        if (!rp) return;
        relatedGrid.innerHTML += '<a class="rel-card" href="product.html?id=' + rid + '"><div class="rel-thumb"><img src="' + rp.images[0] + '" alt="' + rp.name + '" loading="lazy"></div><div class="rel-name">' + rp.name + '</div><div class="rel-price">KES ' + fmt.format(rp.price) + '</div></a>';
      });

      // Cart
      let qty = 1;
      document.getElementById("qtyMinus").addEventListener("click", () => { if (qty > 1) { qty--; document.getElementById("qtyNum").textContent = qty; } });
      document.getElementById("qtyPlus").addEventListener("click", () => { qty++; document.getElementById("qtyNum").textContent = qty; });

      document.getElementById("addToCartBtn").addEventListener("click", () => {
        const items = getCartItems();
        const existing = items.find(it => it.name === p.name);
        if (existing) { existing.qty += qty; } else { items.push({ name: p.name, price: p.price, qty }); }
        setCartItems(items);
        syncCartCount();
        const btn = document.getElementById("addToCartBtn");
        btn.textContent = "✓ Added to Cart!";
        btn.style.background = "#0f9d92";
        setTimeout(() => { btn.textContent = "Add to Cart"; btn.style.background = ""; }, 1600);
      });

      document.getElementById("waBtn").addEventListener("click", () => {
        const msg = encodeURIComponent("Hello! I'd like to order " + qty + "x " + p.name + " (KES " + fmt.format(p.price) + "). Please confirm availability.");
        window.open("https://wa.me/254700000000?text=" + msg, "_blank");
      });

      document.querySelector(".nav-toggle")?.addEventListener("click", () => document.body.classList.toggle("nav-open"));
      syncCartCount();
    }

    // Tabs
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
      });
    });

    loadProduct();
  </script>
